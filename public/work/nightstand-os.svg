<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e7d6c9" />
      <stop offset="50%" stop-color="#b98866" />
      <stop offset="100%" stop-color="#3a2a22" />
    </linearGradient>
    <mask id="moon-mask">
      <rect width="1200" height="900" fill="white" />
      <circle cx="430" cy="360" r="120" fill="black" />
    </mask>
  </defs>
  <rect width="1200" height="900" fill="url(#g)" />
  <circle cx="500" cy="360" r="140" fill="#ffffff" fill-opacity="0.9" mask="url(#moon-mask)" />
  <g fill="none" stroke="#ffffff" stroke-opacity="0.8" stroke-width="4">
    <circle cx="780" cy="560" r="150" />
    <line x1="780" y1="560" x2="780" y2="450" stroke-width="6" stroke-linecap="round" />
    <line x1="780" y1="560" x2="860" y2="560" stroke-width="6" stroke-linecap="round" />
  </g>
</svg>
